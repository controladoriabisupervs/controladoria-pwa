<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controladoria</title>

  <!-- PWA Manifest - mesmo domínio, Chrome aceita -->
  <link rel="manifest" href="https://controladoriabisupervs.github.io/controladoria-pwa/manifest.json">
  <meta name="theme-color" content="#1a3a2f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Controladoria">
  <link rel="apple-touch-icon" href="https://controladoriabisupervs.github.io/controladoria-pwa/icon-192.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #1a3a2f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    svg { width: 72px; height: 72px; }
    p {
      font-family: sans-serif;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f4e8c1;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>
  <!-- ícone -->
  <svg viewBox="0 0 32 26" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="2" y1="1" x2="2" y2="24" stroke="rgba(244,232,193,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="24" x2="30" y2="24" stroke="rgba(244,232,193,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="4"  y="16" width="5" height="8" rx="1" fill="rgba(244,232,193,0.35)"/>
    <rect x="11" y="11" width="5" height="13" rx="1" fill="rgba(244,232,193,0.35)"/>
    <rect x="18" y="13" width="5" height="11" rx="1" fill="rgba(244,232,193,0.35)"/>
    <rect x="25" y="7"  width="5" height="17" rx="1" fill="rgba(244,232,193,0.35)"/>
    <polyline points="6,15 13,10 20,12 27,5" stroke="#f4e8c1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="6"  cy="15" r="1.8" fill="#f4e8c1"/>
    <circle cx="13" cy="10" r="1.8" fill="#f4e8c1"/>
    <circle cx="20" cy="12" r="1.8" fill="#f4e8c1"/>
    <circle cx="27" cy="5"  r="2.2" fill="#f4e8c1"/>
  </svg>
  <p>Carregando...</p>
  <div class="dot"></div>

  <script>
    // Redireciona imediatamente para o Apps Script
    window.location.replace("https://script.google.com/macros/s/AKfycbyev400UOrvnhi-o6T5IujfmcU10sQp2-xWVgoj8E-fIoeDMIiVANqflFS7IfNIeOsH/exec");
  </script>
</body>
</html>
